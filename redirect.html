<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAX - Redirecting...</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#F2F0EA}
.card{background:#fff;border-radius:12px;padding:32px 24px;text-align:center;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.logo{font-size:32px;font-weight:900;color:#E8501A;margin-bottom:8px}
.title{font-size:16px;font-weight:600;color:#1A1916;margin-bottom:6px}
.sub{font-size:13px;color:#5C5A54;margin-bottom:20px;line-height:1.5}
.btn{display:block;width:100%;padding:16px;font-size:16px;font-weight:700;border:none;border-radius:10px;cursor:pointer;text-decoration:none;font-family:-apple-system,sans-serif;margin-bottom:10px;text-align:center}
.btn-orange{background:#E8501A;color:#fff}
.btn-gray{background:#E8E8E4;color:#1A1916;font-size:14px;padding:12px}
.spinner{width:32px;height:32px;border:3px solid #E8E8E4;border-top-color:#E8501A;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">NAX</div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="msg">Opening...</div>
  <div class="sub" id="sub">NAX USA Logistics</div>
  <a class="btn btn-orange" id="open-btn" href="#" style="display:none">Open Page →</a>
  <a class="btn btn-gray" id="copy-btn" href="#" style="display:none" onclick="copyUrl()">Copy URL</a>
</div>
<script>
(function(){
  var p = new URLSearchParams(window.location.search);
  var target = p.get('to');
  
  if(!target){
    document.getElementById('msg').textContent = 'Invalid link';
    document.getElementById('sub').textContent = 'No destination found';
    document.getElementById('spinner').style.display = 'none';
    return;
  }
  
  var decoded = decodeURIComponent(target);
  document.getElementById('msg').textContent = 'Redirecting to NAX system...';
  
  // Try to open immediately
  window.location.href = decoded;
  
  // Fallback after 1.5s (iOS might block the redirect)
  setTimeout(function(){
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Tap to open';
    document.getElementById('sub').textContent = 'If the page did not open automatically, tap the button below.';
    document.getElementById('open-btn').href = decoded;
    document.getElementById('open-btn').style.display = 'block';
    document.getElementById('copy-btn').style.display = 'block';
    window._targetUrl = decoded;
  }, 1500);
})();

function copyUrl(){
  if(window._targetUrl){
    navigator.clipboard.writeText(window._targetUrl).then(function(){
      document.getElementById('copy-btn').textContent = 'Copied!';
    });
  }
}
</script>
</body>
</html>
